# Adjust class/annotations to your ingress controller; TLS is mandatory.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aitp-portal
  namespace: aitp
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
spec:
  ingressClassName: nginx
  tls:
    - hosts: [portal.example.gov.ae]
      secretName: aitp-portal-tls
  rules:
    - host: portal.example.gov.ae
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aitp-portal
                port: { number: 80 }
