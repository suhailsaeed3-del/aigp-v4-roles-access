apiVersion: apps/v1
kind: Deployment
metadata:
  name: aitp-portal
  namespace: aitp
spec:
  replicas: 2
  selector:
    matchLabels: { app: aitp-portal }
  template:
    metadata:
      labels: { app: aitp-portal }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: portal
          image: REGISTRY/aitp-portal:latest # build from ./Dockerfile
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: aitp-config }
            - secretRef: { name: aitp-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Next.js writes to .next/cache
            capabilities: { drop: ["ALL"] }
